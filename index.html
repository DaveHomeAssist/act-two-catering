<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="A premium catering experience tailored for smaller gatherings — restaurant-quality cuisine and exceptional service throughout South Jersey.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Act Two Catering — Premium Catering for Smaller Gatherings">
  <meta property="og:description" content="A premium catering experience tailored for smaller gatherings — restaurant-quality cuisine and exceptional service throughout South Jersey.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Act Two Catering — Premium Catering for Smaller Gatherings">
  <meta name="twitter:description" content="A premium catering experience tailored for smaller gatherings — restaurant-quality cuisine and exceptional service throughout South Jersey.">
  <meta name="theme-color" content="#1E1610">
  <title>Act Two Catering — Premium Catering for Smaller Gatherings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon/favicon.svg">
  <link rel="shortcut icon" href="assets/icons/favicon/favicon.png" type="image/png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon/favicon.png">
  <link rel="icon" href="assets/icons/favicon/favicon.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/favicon/apple-touch-icon.png">
  <style>
    :root {
      --bg-dark: #1E1610;
      --accent: #f5d27a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #1E1610; color: #f5f0eb; }
    .fallback-shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    @media (max-width: 768px) {
      .fallback-shell { padding: 12px; }
    }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      padding: 8px 16px;
      background: #1E1610;
      color: #f5d27a;
      border-radius: 4px;
      z-index: 1000;
      text-decoration: none;
    }
    .skip-link:focus { left: 10px; top: 10px; }
    #root { max-width: 720px; margin: 0 auto; padding: 16px; }
    @media (max-width: 768px) { #root { padding: 12px; } }
    .fallback-header {
      display: grid;
      gap: 10px;
      margin: 3rem 0 1rem;
    }
    .fallback-header h1 {
      font-size: clamp(1.9rem, 4vw, 2.5rem);
      line-height: 1.05;
    }
    .fallback-nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .fallback-nav a:hover,
    .fallback-nav a:focus-visible { text-decoration: underline; }
    .fallback-copy { color: rgba(245,240,235,0.74); line-height: 1.6; }
    #loading { position: fixed; inset: 0; z-index: 9999; background: var(--bg-dark);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.4s ease; }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading-brand { width: 96px; height: 96px; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    body.app-ready {
      background: #FEFCF9;
      color: #2A2A2A;
    }
    body.app-ready .fallback-header {
      display: none;
    }
    body.app-ready main.fallback-shell,
    body.app-ready #root {
      max-width: none;
      margin: 0;
      padding: 0;
    }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <a href="#root" class="skip-link">Skip to content</a>
  <header class="fallback-shell fallback-header">
    <h1>Act Two Catering</h1>
    <nav class="fallback-nav" aria-label="Primary navigation">
      <a href="https://davehomeassist.github.io/">Back to DaveHomeAssist</a>
    </nav>
    <p class="fallback-copy">Premium comfort catering presented through a browser-based ordering and inquiry shell.</p>
  </header>
  <main class="fallback-shell">
    <div id="loading"><img id="loading-brand" src="assets/icons/svg/A2C_icon_animated.svg" alt="Act Two Catering"></div>
    <div id="root">
      <noscript>
        <div style="padding:2rem 0;color:#f5f0eb;line-height:1.7;">
          <h2 style="font-size:1.4rem;margin-bottom:.5rem;color:#f5d27a;">Premium Catering for Smaller Gatherings</h2>
          <p style="color:rgba(245,240,235,0.74);margin-bottom:1rem;">A premium catering experience tailored for smaller gatherings, bringing restaurant-quality cuisine and exceptional service to clients throughout South Jersey.</p>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">What We Do</h3>
          <ul style="list-style:disc;padding-left:1.5rem;color:rgba(245,240,235,0.74);margin-bottom:1rem;">
            <li>Intimate Dinners</li>
            <li>Milestone Events</li>
            <li>Corporate Gatherings</li>
          </ul>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">Contact</h3>
          <p style="color:rgba(245,240,235,0.74);">
            Phone: <a href="tel:+18562965306" style="color:#f5d27a;">856-296-5306</a><br>
            Service area: South Jersey
          </p>
          <p style="color:rgba(245,240,235,0.5);font-size:.85rem;margin-top:1rem;">Enable JavaScript for the full interactive experience.</p>
        </div>
      </noscript>
    </div>
  </main>
  <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script defer src="app.js"></script>
  <script>
    const el = document.getElementById('loading');
    const rootEl = document.getElementById('root');
    const markReady = () => {
      if (!rootEl || !rootEl.children.length) return false;
      if (!document.body.classList.contains('app-ready')) {
        document.body.classList.add('app-ready');
      }
      if (el) {
        el.classList.add('hide');
        setTimeout(() => el.remove(), 500);
      }
      return true;
    };

    const observer = new MutationObserver(() => {
      if (markReady()) observer.disconnect();
    });

    if (rootEl) {
      observer.observe(rootEl, { childList: true });
    }

    const check = () => {
      if (!markReady()) requestAnimationFrame(check);
    };

    requestAnimationFrame(check);
    window.addEventListener('load', markReady, { once: true });
    setTimeout(() => {
      if (!document.body.classList.contains('app-ready') && el) {
        el.classList.add('hide');
      }
    }, 3000);
  </script>
</body>
</html>
